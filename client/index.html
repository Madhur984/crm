<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recon Core — Customer Portal</title>
  <style>
    * { box-sizing: border-box; }
    html, body, #root { margin: 0; padding: 0; height: 100%; }
    body { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; background: #F4F4EF; }
    input, select, textarea, button { font-family: inherit; }
    ::-webkit-scrollbar { width: 12px; height: 12px; }
    ::-webkit-scrollbar-thumb { background: #C4C4BA; border-radius: 5px; border: 3px solid #F4F4EF; }
    ::-webkit-scrollbar-thumb:hover { background: #A7A79C; }
    ::-webkit-scrollbar-track { background: transparent; }

    /* Soft-brutalist interaction — small hard shadows, gentle press */
    .rc-btn { transition: transform .08s ease, box-shadow .08s ease, background .12s ease, color .12s ease; }
    .rc-btn-primary, .rc-btn-secondary, .rc-btn-subtle, .rc-btn-dark { box-shadow: 2px 2px 0 #2B3340; }
    .rc-btn-primary:hover, .rc-btn-secondary:hover, .rc-btn-subtle:hover, .rc-btn-dark:hover { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 #2B3340; }
    .rc-btn-primary:active, .rc-btn-secondary:active, .rc-btn-subtle:active, .rc-btn-dark:active { transform: translate(2px,2px); box-shadow: 0 0 0 #2B3340; }
    .rc-btn-primary:hover { background: #16A34A; }
    .rc-btn-secondary:hover { background: #F4F4EF; }
    .rc-btn-subtle:hover { background: #BBF7D0; }
    .rc-btn-dark:hover { background: #000000; }
    .rc-btn-ghost { box-shadow: none; }
    .rc-btn-ghost:hover { background: #EEEEE7; }

    .rc-card { transition: transform .12s ease, box-shadow .12s ease; }
    .rc-card-hover:hover { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 #2B3340 !important; }

    .rc-nav { transition: transform .1s ease, box-shadow .1s ease, background .12s ease, color .12s ease; }
    .rc-nav:hover { background: #EEEEE7; }
    .rc-row { transition: background .12s ease; }
    .rc-row:hover { background: #F6F6EF; }
    .rc-tab { transition: color .13s ease, border-color .13s ease; }
    .rc-link { transition: opacity .12s ease; }
    .rc-link:hover { opacity: .72; }

    /* Emerald focus with a soft offset shadow */
    input:focus, select:focus, textarea:focus { border-color: #16A34A !important; box-shadow: 2px 2px 0 rgba(22,163,74,.7); }
    .rc-search:focus-within { border-color: #16A34A !important; box-shadow: 2px 2px 0 rgba(22,163,74,.7); }

    /* ── Responsive ─────────────────────────────────────────────────────── */
    body { overflow-x: hidden; }
    .rc-topsearch { width: clamp(130px, 24vw, 244px) !important; }
    .rc-hamburger { display: none; }
    .rc-overlay { position: fixed; inset: 0; background: rgba(17,24,39,.42); z-index: 150; }

    /* Two-column content + wide KPI rows collapse first (tablet) */
    @media (max-width: 1024px) {
      .rc-cols-main, .rc-cols-side { grid-template-columns: minmax(0,1fr) !important; }
      .rc-cols-5 { grid-template-columns: repeat(3, minmax(0,1fr)) !important; }
      .rc-cols-4 { grid-template-columns: repeat(2, minmax(0,1fr)) !important; }
      .rc-cols-3 { grid-template-columns: repeat(2, minmax(0,1fr)) !important; }
    }

    /* Off-canvas drawer sidebar below 900px */
    @media (max-width: 900px) {
      .rc-sidebar {
        position: fixed !important; top: 0; left: 0; height: 100vh !important;
        transform: translateX(-100%); transition: transform .25s ease; z-index: 200;
      }
      .rc-sidebar.rc-open { transform: translateX(0); box-shadow: 4px 0 0 rgba(17,24,39,.25); }
      .rc-hamburger { display: inline-flex !important; }
    }
    @media (min-width: 901px) { .rc-overlay { display: none !important; } }

    /* Phones: single column + tighter chrome */
    @media (max-width: 680px) {
      .rc-cols-2, .rc-cols-3, .rc-cols-4, .rc-cols-5 { grid-template-columns: minmax(0,1fr) !important; }
      .rc-content { padding: 16px 14px 48px !important; }
      .rc-header { padding: 0 12px !important; height: 58px !important; }
    }
    @media (max-width: 440px) {
      .rc-topsearch { display: none !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
