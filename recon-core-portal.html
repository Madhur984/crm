/* SHARED UI PRIMITIVES                                                   */
/* ---------------------------------------------------------------------- */
function tone(status) {
  const good = ["Completed", "Validated", "Confirmed", "Verified", "Paid", "On Track", "Resolved", "Acknowledged", "Signed", "Current", "Bound"];
  const active = ["In Progress", "Monitoring", "Answered", "Issued", "Invoiced"];
  const attention = ["Needs Attention", "Under Review", "Clarification Needed", "Overdue", "Elevated", "Open"];
  if (good.includes(status)) return "good";
  if (active.includes(status)) return "active";
  if (attention.includes(status)) return "attention";
  return "pending";
}
const TONE_STYLE = {
  good: { bg: T.greenSoft, fg: T.green, dot: T.green },
  active: { bg: T.blueSoft, fg: T.blue, dot: T.blue },
  attention: { bg: T.amberSoft, fg: T.amber, dot: T.amber },
  pending: { bg: T.greySoft, fg: T.grey, dot: T.faint },
};

function Pill({ status }) {
  const s = TONE_STYLE[tone(status)];
  return (
    <span style={{
      display: "inline-flex", alignItems: "center", gap: 6, padding: "3px 9px",
      borderRadius: 999, background: s.bg, color: s.fg, fontSize: 12, fontWeight: 600,
      letterSpacing: 0.1, whiteSpace: "nowrap",
    }}>
      <span style={{ width: 6, height: 6, borderRadius: 999, background: s.dot, flexShrink: 0 }} />
      {status}
    </span>
  );
}

function Card({ title, action, children, style }) {
  return (
    <div style={{ background: T.panel, border: `1px solid ${T.line}`, borderRadius: 10, padding: 20, ...style }}>
      {(title || action) && (
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
          {title && <h3 style={{ margin: 0, fontSize: 13, fontWeight: 700, color: T.ink, letterSpacing: 0.2, textTransform: "uppercase" }}>{title}</h3>}
          {action}
        </div>
      )}
      {children}
    </div>
  );
}

function Ring({ pct, size = 76, color = T.blue, label }) {
  return (
    <div style={{ position: "relative", width: size, height: size, flexShrink: 0 }}>
      <div style={{
        width: size, height: size, borderRadius: "50%",
        background: `conic-gradient(${color} ${pct * 3.6}deg, ${T.mist} 0deg)`,
      }} />
      <div style={{
        position: "absolute", inset: 6, borderRadius: "50%", background: T.panel,
        display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
      }}>
        <span style={{ fontFamily: MONO, fontSize: 17, fontWeight: 700, color: T.ink }}>{pct}%</span>
        {label && <span style={{ fontSize: 8, color: T.faint, marginTop: 1 }}>{label}</span>}
      </div>
    </div>
  );
}

function Btn({ children, onClick, variant = "primary", icon: IconComp, style, small }) {
  const base = {
    display: "inline-flex", alignItems: "center", gap: 7, cursor: "pointer",
    border: "1px solid transparent", borderRadius: 7, fontWeight: 600,
    fontSize: small ? 12 : 13, padding: small ? "6px 10px" : "8px 14px",
    fontFamily: SANS, transition: "background .12s, border-color .12s",
  };
  const variants = {
    primary: { background: T.ink, color: "#fff" },
    secondary: { background: T.panel, color: T.ink, borderColor: T.line },
    ghost: { background: "transparent", color: T.graphite },
    subtle: { background: T.mist, color: T.ink },
  };
  return (
    <button onClick={onClick} style={{ ...base, ...variants[variant], ...style }}>
      {IconComp && <IconComp size={small ? 13 : 14} strokeWidth={2.2} />}
      {children}
    </button>
  );
}

function Toast({ message }) {
  if (!message) return null;
  return (
    <div style={{
      position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)",
      background: T.ink, color: "#fff", padding: "10px 18px", borderRadius: 8,
      fontSize: 13, fontWeight: 600, zIndex: 200, boxShadow: "0 8px 24px rgba(0,0,0,.25)",
      display: "flex", alignItems: "center", gap: 8,
    }}>
      <CheckCircle2 size={15} /> {message}
    </div>
  );
}

function LifecycleRail({ dates, currentIndex, onJump, compact }) {
  return (
    <div style={{ position: "relative", padding: compact ? "6px 4px" : "10px 4px 4px" }}>
      <div style={{ display: "flex", alignItems: "flex-start", position: "relative" }}>
        <div style={{
          position: "absolute", top: compact ? 7 : 9, left: 0, right: 0, height: 2, background: T.line, zIndex: 0,
        }} />
        <div style={{
          position: "absolute", top: compact ? 7 : 9, left: 0, height: 2, background: T.blue, zIndex: 0,
          width: `${(currentIndex / (STAGES.length - 1)) * 100}%`, transition: "width .3s",
        }} />
        {STAGES.map((s, i) => {
          const d = dates[i];
          const isCurrent = i === currentIndex;
          const s_ = TONE_STYLE[tone(d.status)];
          return (
            <div key={s} onClick={() => onJump && onJump(i)}
              style={{ flex: 1, position: "relative", zIndex: 1, textAlign: "center", cursor: onJump ? "pointer" : "default" }}>
              <div style={{
                width: compact ? 14 : 18, height: compact ? 14 : 18, margin: "0 auto", borderRadius: 5,
                transform: "rotate(45deg)", background: isCurrent ? T.blue : s_.dot,
                border: `2px solid ${T.panel}`, boxShadow: isCurrent ? `0 0 0 3px ${T.blueSoft}` : "none",
              }} />
              {!compact && (
                <div style={{ marginTop: 10, padding: "0 2px" }}>
                  <div style={{ fontSize: 11, fontWeight: isCurrent ? 700 : 600, color: isCurrent ? T.ink : T.graphite, lineHeight: 1.25 }}>{s}</div>
                  <div style={{ fontSize: 10, color: T.faint, marginTop: 3, fontFamily: MONO }}>{d.date}</div>
                  <div style={{ marginTop: 4 }}><Pill status={d.status} /></div>
                  <div style={{ fontSize: 9.5, color: T.faint, marginTop: 4 }}>{d.team}</div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function Table({ columns, rows, renderCell }) {
  return (
    <div style={{ overflowX: "auto" }}>
      <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
        <thead>
          <tr>
            {columns.map((c) => (
              <th key={c} style={{
                textAlign: "left", padding: "8px 12px", fontSize: 11, fontWeight: 700,
                color: T.faint, textTransform: "uppercase", letterSpacing: 0.3,
                borderBottom: `1px solid ${T.line}`, whiteSpace: "nowrap",
              }}>{c}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {rows.map((r, i) => (
            <tr key={i} style={{ borderBottom: `1px solid ${T.line}` }}>
              {columns.map((c) => (
                <td key={c} style={{ padding: "10px 12px", color: T.ink, verticalAlign: "middle" }}>
                  {renderCell ? renderCell(r, c) : r[c]}
                </td>
              ))}
            </tr>
          ))}
        </tbody>
      </table>
      {rows.length === 0 && (
        <div style={{ padding: "28px 12px", textAlign: "center", color: T.faint, fontSize: 13 }}>No matching records.</div>
      )}
    </div>
  );
}

function PageHeader({ eyebrow, title, action }) {
  return (
    <div style={{ display: "flex", alignItems: "flex-end", justifyContent: "space-between", marginBottom: 22, flexWrap: "wrap", gap: 10 }}>
      <div>
        <div style={{ fontSize: 11, fontWeight: 700, color: T.faint, textTransform: "uppercase", letterSpacing: 0.6, marginBottom: 4 }}>{eyebrow}</div>
        <h1 style={{ margin: 0, fontSize: 24, fontWeight: 700, color: T.ink, letterSpacing: -0.3 }}>{title}</h1>
      </div>
      {action}
    </div>
  );
}

function SupportPage({ proj, notify }) {
  const [ticketOpen, setTicketOpen] = useState(false);
  const [tickets, setTickets] = useState([]);
  const [form, setForm] = useState({ category: "Technical", priority: "Normal", description: "" });
  const [chatOpen, setChatOpen] = useState(false);
  const [chatMsgs, setChatMsgs] = useState([{ from: "Recon", text: "Hi — how can we help today?" }]);
  const [chatInput, setChatInput] = useState("");

  const submitTicket = () => {
    if (!form.description.trim()) { notify("Add a description before submitting"); return; }
    setTickets((t) => [{ id: `T-${1000 + t.length + 1}`, ...form, status: "Open" }, ...t]);
    setForm({ category: "Technical", priority: "Normal", description: "" });
    setTicketOpen(false);
    notify("Ticket submitted — you'll hear back shortly");
  };
  const sendChat = () => {
    if (!chatInput.trim()) return;
    setChatMsgs((m) => [...m, { from: "You", text: chatInput }]);
    setChatInput("");
    setTimeout(() => setChatMsgs((m) => [...m, { from: "Recon", text: "Got it — routing this to the right team now." }]), 500);
  };

  return (
    <React.Fragment>
      <PageHeader eyebrow={proj.code} title="Support" />
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 14, marginBottom: 20 }}>
        {proj.reconTeam.map((m) => (
          <Card key={m.role}>
            <div style={{ width: 34, height: 34, borderRadius: "50%", background: T.ink, color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 700, marginBottom: 10 }}>
              {m.name.split(" ").map(n => n[0]).join("")}
            </div>
            <div style={{ fontSize: 13.5, fontWeight: 700 }}>{m.name}</div>
            <div style={{ fontSize: 11.5, color: T.faint, marginBottom: 8 }}>{m.role}</div>
            <div style={{ fontSize: 11, color: T.faint, marginBottom: 10 }}>Typically replies in {m.response}</div>
            <Btn small variant="secondary" icon={MessageSquare} onClick={() => setChatOpen(true)}>Message</Btn>
          </Card>
        ))}
      </div>

      <div style={{ display: "flex", gap: 10, marginBottom: 20, flexWrap: "wrap" }}>
        <Btn icon={Plus} onClick={() => setTicketOpen(true)}>Raise a ticket</Btn>
        <Btn variant="secondary" icon={Calendar} onClick={() => notify("Opening scheduler...")}>Book a meeting</Btn>
        <Btn variant="secondary" icon={Video} onClick={() => notify("Starting video call...")}>Start video call</Btn>
        <Btn variant="secondary" icon={MessageSquare} onClick={() => setChatOpen(true)}>Chat</Btn>
      </div>

      <Card style={{ marginBottom: 20, borderColor: T.amber, background: T.amberSoft }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <AlertTriangle size={18} color={T.amber} />
          <div>
            <div style={{ fontSize: 13, fontWeight: 700, color: T.ink }}>Emergency contact (logistics & compliance, after hours)</div>
            <div style={{ fontSize: 12.5, color: T.graphite, display: "flex", alignItems: "center", gap: 6, marginTop: 2 }}>
              <Phone size={12} /> +1 (512) 555-0199 — for time-critical customs or shipment issues only
            </div>
          </div>
        </div>
      </Card>

      {tickets.length > 0 && (
        <Card title="Your Tickets" style={{ marginBottom: 20 }}>
          <Table columns={["id", "category", "priority", "status"]} rows={tickets}
            renderCell={(r, c) => c === "status" ? <Pill status={r[c]} /> : c === "id" ? <span style={{ fontFamily: MONO, fontWeight: 600 }}>{r[c]}</span> : r[c]} />
        </Card>
      )}

      <Card title="Knowledge Base">
        <div style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 10 }}>
          {["Understanding your Procurement Confidence score", "How customs clearance works", "Reading your compliance package",
            "What happens during First Article Inspection", "How payment milestones are structured", "Requesting a BOM change"].map((f) => (
            <div key={f} onClick={() => notify("Opening article...")} style={{
              display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 12px",
              border: `1px solid ${T.line}`, borderRadius: 8, fontSize: 13, cursor: "pointer",
            }}>{f} <ChevronRight size={14} color={T.faint} /></div>
          ))}
        </div>
      </Card>

      {ticketOpen && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(10,12,16,.45)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 150 }}>
          <div style={{ background: "#fff", borderRadius: 12, padding: 24, width: 440 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
              <h3 style={{ margin: 0, fontSize: 16 }}>Raise a ticket</h3>
              <X size={18} style={{ cursor: "pointer" }} onClick={() => setTicketOpen(false)} />
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              <div>
                <label style={{ fontSize: 11.5, fontWeight: 700, color: T.faint, textTransform: "uppercase" }}>Category</label>
                <select value={form.category} onChange={(e) => setForm({ ...form, category: e.target.value })}
                  style={{ width: "100%", marginTop: 5, padding: "8px 10px", border: `1px solid ${T.line}`, borderRadius: 7, fontSize: 13 }}>
                  {["Technical", "Compliance", "Commercial", "Logistics", "General"].map((c) => <option key={c}>{c}</option>)}
                </select>
              </div>
              <div>
                <label style={{ fontSize: 11.5, fontWeight: 700, color: T.faint, textTransform: "uppercase" }}>Priority</label>
                <select value={form.priority} onChange={(e) => setForm({ ...form, priority: e.target.value })}
                  style={{ width: "100%", marginTop: 5, padding: "8px 10px", border: `1px solid ${T.line}`, borderRadius: 7, fontSize: 13 }}>
                  {["Low", "Normal", "High", "Urgent"].map((c) => <option key={c}>{c}</option>)}
                </select>
              </div>
              <div>
                <label style={{ fontSize: 11.5, fontWeight: 700, color: T.faint, textTransform: "uppercase" }}>Description</label>
                <textarea value={form.description} onChange={(e) => setForm({ ...form, description: e.target.value })} rows={4}
                  style={{ width: "100%", marginTop: 5, padding: "8px 10px", border: `1px solid ${T.line}`, borderRadius: 7, fontSize: 13, resize: "vertical", fontFamily: SANS }} />
              </div>
              <div style={{ display: "flex", gap: 8, justifyContent: "flex-end", marginTop: 6 }}>
                <Btn variant="secondary" onClick={() => setTicketOpen(false)}>Cancel</Btn>
                <Btn onClick={submitTicket}>Submit ticket</Btn>
              </div>
            </div>
          </div>
        </div>
      )}

      {chatOpen && (
        <div style={{ position: "fixed", bottom: 20, right: 20, width: 320, background: "#fff", border: `1px solid ${T.line}`, borderRadius: 12, boxShadow: "0 12px 32px rgba(0,0,0,.18)", zIndex: 150, display: "flex", flexDirection: "column", maxHeight: 420 }}>
          <div style={{ padding: "12px 14px", borderBottom: `1px solid ${T.line}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ fontSize: 13, fontWeight: 700 }}>Recon Support</span>
            <X size={16} style={{ cursor: "pointer" }} onClick={() => setChatOpen(false)} />
          </div>
          <div style={{ flex: 1, overflowY: "auto", padding: 12, display: "flex", flexDirection: "column", gap: 8 }}>
            {chatMsgs.map((m, i) => (
              <div key={i} style={{
                alignSelf: m.from === "You" ? "flex-end" : "flex-start", background: m.from === "You" ? T.ink : T.mist,
                color: m.from === "You" ? "#fff" : T.ink, padding: "7px 11px", borderRadius: 10, fontSize: 12.5, maxWidth: "80%",
              }}>{m.text}</div>
            ))}
          </div>
          <div style={{ display: "flex", gap: 6, padding: 10, borderTop: `1px solid ${T.line}` }}>
            <input value={chatInput} onChange={(e) => setChatInput(e.target.value)} onKeyDown={(e) => e.key === "Enter" && sendChat()}
              placeholder="Type a message..." style={{ flex: 1, border: `1px solid ${T.line}`, borderRadius: 7, padding: "7px 10px", fontSize: 12.5, outline: "none" }} />
            <Btn small icon={Send} onClick={sendChat}>{""}</Btn>
          </div>
        </div>
      )}
    </React.Fragment>
  );
}

/* ---------------------------------------------------------------------- */
/* SHELL                                                                  */
/* ---------------------------------------------------------------------- */
function ReconPortal() {
  const [page, setPage] = useState("dashboard");
  const [projectId, setProjectId] = useState("p1");
  const [switcherOpen, setSwitcherOpen] = useState(false);
  const [toast, setToast] = useState("");
  const toastTimer = useRef(null);

  const notify = (msg) => {
    setToast(msg);
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(""), 2400);
  };

  const proj = PROJECTS[projectId];
  const props = { proj, notify, go: setPage, allProjects: PROJECTS };

  const pageMap = {
    dashboard: <DashboardPage {...props} />,
    project: <ProjectDetailsPage {...props} />,
    technical: <TechnicalPage {...props} />,
    atlas: <AtlasPage {...props} />,
    compliance: <CompliancePage {...props} />,
    commercial: <CommercialPage {...props} />,
    logistics: <LogisticsPage {...props} />,
    documents: <DocumentsPage {...props} />,
    communication: <CommunicationPage {...props} />,
    support: <SupportPage {...props} />,
  };

  return (
    <div style={{ fontFamily: SANS, background: T.mist, minHeight: "100vh", color: T.ink, display: "flex", fontSize: 14 }}>
      <div style={{ width: 232, flexShrink: 0, background: T.panel, borderRight: `1px solid ${T.line}`, display: "flex", flexDirection: "column", position: "sticky", top: 0, height: "100vh" }}>
        <div style={{ padding: "20px 18px 16px", display: "flex", alignItems: "center", gap: 9, borderBottom: `1px solid ${T.line}` }}>
          <div style={{ width: 26, height: 26, borderRadius: 6, background: T.ink, display: "flex", alignItems: "center", justifyContent: "center" }}>
            <div style={{ width: 10, height: 10, background: "#7FA6FF", transform: "rotate(45deg)", borderRadius: 2 }} />
          </div>
          <div>
            <div style={{ fontSize: 14, fontWeight: 800, letterSpacing: -0.2 }}>Recon Core</div>
            <div style={{ fontSize: 9.5, color: T.faint, letterSpacing: 0.4, textTransform: "uppercase" }}>Customer Portal</div>
          </div>
        </div>
        <div style={{ flex: 1, padding: "12px 10px", overflowY: "auto" }}>
          {NAV.map((n) => {
            const IconComp = n.icon;
            const active = page === n.id;
            return (
              <div key={n.id} onClick={() => setPage(n.id)} style={{
                display: "flex", alignItems: "center", gap: 10, padding: "9px 10px", borderRadius: 7,
                cursor: "pointer", marginBottom: 2, background: active ? T.blueSoft : "transparent",
                color: active ? T.blue : T.graphite, fontWeight: active ? 700 : 500, fontSize: 13,
              }}>
                <IconComp size={16} strokeWidth={2.1} />
                {n.label}
              </div>
            );
          })}
        </div>
        <div style={{ padding: 14, borderTop: `1px solid ${T.line}` }}>
          <div style={{ fontSize: 11, color: T.faint }}>Signed in as</div>
          <div style={{ fontSize: 12.5, fontWeight: 700 }}>{proj.contacts[0] ? proj.contacts[0].name : "Customer"}</div>
        </div>
      </div>

      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{
          height: 58, borderBottom: `1px solid ${T.line}`, background: T.panel, display: "flex",
          alignItems: "center", justifyContent: "space-between", padding: "0 24px", position: "sticky", top: 0, zIndex: 50,
        }}>
          <div style={{ position: "relative" }}>
            <div onClick={() => setSwitcherOpen((o) => !o)} style={{
              display: "flex", alignItems: "center", gap: 8, cursor: "pointer", padding: "7px 12px",
              border: `1px solid ${T.line}`, borderRadius: 8, background: T.mist,
            }}>
              <Building2 size={14} color={T.graphite} />
              <span style={{ fontSize: 13, fontWeight: 700 }}>{proj.name}</span>
              <span style={{ fontSize: 11, color: T.faint, fontFamily: MONO }}>{proj.code}</span>
              <ChevronDown size={13} color={T.faint} />
            </div>
            {switcherOpen && (
              <div style={{ position: "absolute", top: "115%", left: 0, background: "#fff", border: `1px solid ${T.line}`, borderRadius: 8, boxShadow: "0 12px 28px rgba(0,0,0,.12)", width: 260, zIndex: 60 }}>
                {Object.values(PROJECTS).map((p) => (
                  <div key={p.id} onClick={() => { setProjectId(p.id); setSwitcherOpen(false); setPage("dashboard"); }} style={{
                    padding: "10px 14px", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center",
                    background: p.id === projectId ? T.mist : "transparent",
                  }}>
                    <div>
                      <div style={{ fontSize: 13, fontWeight: 600 }}>{p.name}</div>
                      <div style={{ fontSize: 10.5, color: T.faint, fontFamily: MONO }}>{p.code}</div>
                    </div>
                    <Pill status={p.status} />
                  </div>
                ))}
              </div>
            )}
          </div>

          <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 7, background: T.mist, border: `1px solid ${T.line}`, borderRadius: 7, padding: "6px 11px", width: 220 }}>
              <Search size={13} color={T.faint} />
              <input placeholder="Search this portal..." style={{ border: "none", background: "transparent", outline: "none", fontSize: 12.5, width: "100%" }} />
            </div>
            <div style={{ position: "relative", cursor: "pointer" }} onClick={() => notify("3 unread notifications")}>
              <Bell size={17} color={T.graphite} />
              <div style={{ position: "absolute", top: -3, right: -3, width: 8, height: 8, borderRadius: "50%", background: T.amber, border: "1.5px solid #fff" }} />
            </div>
            <div style={{ width: 30, height: 30, borderRadius: "50%", background: T.ink, color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 700 }}>
              {(proj.contacts[0] ? proj.contacts[0].name : "CU").split(" ").map(n => n[0]).join("")}
            </div>
          </div>
        </div>

        <div style={{ padding: "26px 32px 60px", maxWidth: 1280 }}>
          {pageMap[page]}
        </div>
      </div>

      <Toast message={toast} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<ReconPortal />);
</script>
</body>
</html>
